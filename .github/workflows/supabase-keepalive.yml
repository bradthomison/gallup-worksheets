name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 12 * * 1'   # Mondays at 12:00 UTC
    - cron: '0 12 * * 4'   # Thursdays at 12:00 UTC
  workflow_dispatch:         # Allow manual trigger from Actions tab

jobs:
  ping:
    name: Ping database
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "Pinging Supabase..."

          CLEAN_URL="${SUPABASE_URL%/}"

          HTTP_STATUS=$(curl -o /tmp/ping_response.json -w "%{http_code}" -s \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            "${CLEAN_URL}/rest/v1/sessions?select=id&limit=1")

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Keep-alive ping succeeded (HTTP $HTTP_STATUS)"
            cat /tmp/ping_response.json
          else
            echo "❌ Keep-alive ping failed (HTTP $HTTP_STATUS)"
            cat /tmp/ping_response.json
            exit 1
          fi
